# Cloudflare Pages configuration for EduPulse
# https://developers.cloudflare.com/pages/

name = "edupulse"

# Build configuration
pages_build_output_dir = "./frontend/dist"

# Environment variables for Cloudflare Pages Functions (runtime only)
# NOTE: Vite build-time variables cannot be set here.
# VITE_API_URL is set via frontend/.env.production instead.
# https://vite.dev/guide/env-and-mode#env-files
[vars]
VITE_API_URL = "https://edypulse.onrender.com/api"

# Compatibility flags for newer Workers APIs
compatibility_flags = ["nodejs_compat"]
compatibility_date = "2025-04-01"
